<script>
$(function() {
	var $btn = $(".login-toggle-btn");
	var $headerLogin = $(".header__login");
	if (!$btn.length || !$headerLogin.length) return;

	function applyState(isLoggedIn) {
		$headerLogin.removeClass("header__login--on header__login--off").addClass("header__login--" + (isLoggedIn ? "on" : "off"));
		$(".mobile-login-bx").removeClass("mobile-login-bx--on mobile-login-bx--off").addClass("mobile-login-bx--" + (isLoggedIn ? "on" : "off"));
		$btn.text(isLoggedIn ? "로그아웃" : "로그인").attr("data-logged-in", isLoggedIn ? "1" : "0");
	}

	var stored = localStorage.getItem("debug_login");
	var isLoggedIn = stored !== null ? stored === "1" : $btn.attr("data-logged-in") === "1";
	applyState(isLoggedIn);

	$btn.on("click", function() {
		isLoggedIn = !$headerLogin.hasClass("header__login--on");
		localStorage.setItem("debug_login", isLoggedIn ? "1" : "0");
		applyState(isLoggedIn);
	});
});
</script>
