<script>
    $(document).ready(function () {
        $(".dropdown").click(function () {
            var dropMenu = $(".dropmenu");
            if (dropMenu.is(":visible")) {
                dropMenu.slideUp();
                $(".xi-angle-up").removeClass("rotate");
            } else {
                dropMenu.slideDown();
                $(".xi-angle-up").addClass("rotate");
            }
        });

        // 헤더 계정 드롭다운
        $(".header__user-trigger").on("click", function (e) {
            e.stopPropagation();
            var $user = $(this).closest(".header__account--user");
            var $dropdown = $user.find(".header__dropdown");
            var isOpen = $user.hasClass("is-open");
            $(".header__account--user").removeClass("is-open");
            $(".header__dropdown").attr("hidden", true);
            if (!isOpen) {
                $user.addClass("is-open");
                $dropdown.removeAttr("hidden");
                $(this).attr("aria-expanded", "true");
            } else {
                $(this).attr("aria-expanded", "false");
            }
        });
        $(document).on("click", function () {
            $(".header__account--user").removeClass("is-open");
            $(".header__dropdown").attr("hidden", true);
            $(".header__user-trigger").attr("aria-expanded", "false");
        });
    });
</script>
