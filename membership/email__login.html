  <script>
    $(function () {
      var $form = $(".email_login_form");
      if (!$form.length) return;

      var $email = $("#email_login_email");
      var $password = $("#email_login_pw");
      var $emailMsg = $form.find('[data-error="email"]');
      var $pwRequiredMsg = $form.find('[data-error="password-required"]');
      var $authFailMsg = $form.find('[data-error="auth-fail"]');
      var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

      function hideEmailError() {
        $email.removeClass("bd-red");
        $emailMsg.removeClass("is-visible");
      }

      function hidePasswordError() {
        $password.removeClass("bd-red");
        $pwRequiredMsg.removeClass("is-visible");
      }

      function hideAuthFailError() {
        $authFailMsg.removeClass("is-visible");
      }

      function validateEmail() {
        var value = ($email.val() || "").trim();
        if (!value || !emailRegex.test(value)) {
          $email.addClass("bd-red");
          $emailMsg.addClass("is-visible");
          return false;
        }
        hideEmailError();
        return true;
      }

      function validatePassword() {
        var value = ($password.val() || "").trim();
        if (!value) {
          $password.addClass("bd-red");
          $pwRequiredMsg.addClass("is-visible");
          return false;
        }
        hidePasswordError();
        return true;
      }

      $email.on("input blur", function () {
        hideAuthFailError();
        if (($email.val() || "").trim()) validateEmail();
        else hideEmailError();
      });

      $password.on("input blur", function () {
        hideAuthFailError();
        if (($password.val() || "").trim()) hidePasswordError();
      });

      $form.on("submit", function (e) {
        hideAuthFailError();
        var emailOk = validateEmail();
        var passwordOk = validatePassword();

        if (!emailOk || !passwordOk) {
          e.preventDefault();
          if (!emailOk) $email.focus();
          else $password.focus();
        }
      });

      // 서버 인증 실패시 이 훅을 호출해 메시지를 노출하세요.
      window.showEmailLoginAuthFail = function () {
        hideEmailError();
        hidePasswordError();
        $email.addClass("bd-red");
        $password.addClass("bd-red");
        $authFailMsg.addClass("is-visible");
      };
    });
  </script>
</body>
